<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240" role="img" aria-label="Sleepless: keep your Mac awake with the lid closed">
  <title>Sleepless</title>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#8a6cf6"/>
      <stop offset="0.55" stop-color="#6843d8"/>
      <stop offset="1" stop-color="#4a2caa"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece4ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#e3d6ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#e3d6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="moonMask">
      <circle cx="120" cy="120" r="48" fill="#ffffff"/>
      <circle cx="148" cy="106" r="43" fill="#000000"/>
    </mask>
    <style>
      .halo  { animation: breathe 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: ping 3.6s ease-out infinite; }
      .pb    { animation-delay: 1.8s; }
      .moon  { animation: glow 3.6s ease-in-out infinite; }
      .star  { animation: twinkle 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .s2 { animation-delay: .3s } .s3 { animation-delay: .7s } .s4 { animation-delay: 1.1s } .s5 { animation-delay: 1.4s } .s6 { animation-delay: .5s }
      @keyframes breathe { 0%,100% { opacity:.5; transform:scale(.92) } 50% { opacity:1; transform:scale(1.08) } }
      @keyframes ping    { 0% { transform:scale(.55); opacity:.55 } 70% { opacity:0 } 100% { transform:scale(2.3); opacity:0 } }
      @keyframes glow    { 0%,100% { opacity:.9 } 50% { opacity:1 } }
      @keyframes twinkle { 0%,100% { opacity:.22; transform:scale(.8) } 50% { opacity:1; transform:scale(1.12) } }
      @media (prefers-reduced-motion: reduce) { .halo,.pulse,.moon,.star { animation: none } }
    </style>
  </defs>

  <rect x="2" y="2" width="816" height="236" rx="30" fill="url(#plate)"/>
  <rect x="2" y="2" width="816" height="120" rx="30" fill="url(#sheen)"/>
  <rect x="2.5" y="2.5" width="815" height="235" rx="29.5" fill="none" stroke="#ffffff" stroke-opacity="0.28"/>

  <!-- twinkling stars -->
  <circle class="star s1" cx="300" cy="52" r="2.6" fill="#ffffff"/>
  <circle class="star s2" cx="402" cy="38" r="2.0" fill="#f3eeff"/>
  <circle class="star s3" cx="650" cy="60" r="2.4" fill="#ffffff"/>
  <circle class="star s4" cx="740" cy="92" r="2.0" fill="#f3eeff"/>
  <circle class="star s5" cx="560" cy="44" r="1.8" fill="#ffffff"/>
  <circle class="star s6" cx="488" cy="30" r="1.6" fill="#ece3ff"/>

  <!-- "awake" heartbeat pulse + breathing halo + crescent -->
  <circle class="pulse"    cx="120" cy="120" r="46" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle class="pulse pb" cx="120" cy="120" r="46" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle class="halo" cx="120" cy="118" r="84" fill="url(#halo)"/>
  <g class="moon" mask="url(#moonMask)">
    <rect x="66" y="62" width="120" height="120" fill="url(#moonGrad)"/>
  </g>

  <!-- wordmark -->
  <text x="222" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">Sleepless</text>
  <text x="225" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" font-weight="600" fill="#f0e9ff">Keep your Mac awake with the lid closed.</text>
  <text x="225" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#d8ccff">On battery &#183; no external display &#183; auto-off at your battery floor</text>
</svg>
